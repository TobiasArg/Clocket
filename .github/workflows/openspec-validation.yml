name: OpenSpec Validation

on:
  pull_request:
    paths:
      - "openspec/**"
      - ".github/workflows/openspec-validation.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "openspec/**"
      - ".github/workflows/openspec-validation.yml"

jobs:
  openspec-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenSpec CLI
        run: npm install --global @fission-ai/openspec@1.3.1

      - name: Validate active OpenSpec changes
        run: openspec validate --changes --strict --no-interactive

      - name: Validate canonical OpenSpec specs
        run: openspec validate --specs --strict --no-interactive
