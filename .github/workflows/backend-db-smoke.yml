name: Backend DB Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/prisma/**"
      - "backend/src/persistence/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/backend-db-smoke.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "backend/prisma/**"
      - "backend/src/persistence/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/backend-db-smoke.yml"

jobs:
  backend-db-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clocket
          POSTGRES_PASSWORD: clocket
          POSTGRES_DB: clocket_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clocket -d clocket_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clocket:clocket@localhost:5432/clocket_dev?schema=public
      DIRECT_URL: postgresql://clocket:clocket@localhost:5432/clocket_dev?schema=public
      RUN_DB_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Generate Prisma client
        run: npm --prefix backend run prisma:generate

      - name: Apply Prisma migrations
        run: npm exec prisma migrate deploy
        working-directory: backend

      - name: Run PostgreSQL smoke tests
        run: npm --prefix backend run test:db
