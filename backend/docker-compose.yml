services:
  postgres:
    image: postgres:16-alpine
    container_name: clocket-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: clocket
      POSTGRES_PASSWORD: clocket
      POSTGRES_DB: clocket_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clocket -d clocket_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - clocket_postgres_data:/var/lib/postgresql/data

volumes:
  clocket_postgres_data:
