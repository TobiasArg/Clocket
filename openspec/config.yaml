schema: spec-driven

context: |
  Project: Clocket, a personal finance monorepo.
  Frontend: Vite, React 18, TypeScript, Tailwind CSS v4.
  Backend current state: Next.js 14 Pages Router API Routes in backend/pages/api with TypeScript service/module boundaries under backend/src.
  Current persistence: backend-owned Prisma/PostgreSQL persistence is canonical for active finance domains; frontend runtime repositories use HTTP/API-backed adapters for budgets, goals, installments/cuotas, investments, settings, market refs/snapshots, exchange rates, and migrated feature-domain flows.
  Legacy frontend localStorage repositories are archived compatibility/test history only and must not be treated as the active source of financial truth or reintroduced through runtime barrels.
  Backend target direction: keep Next.js API Routes first, continue hardening backend service boundaries, validation, read models, integrity, CI, and accessibility; document NestJS only as an escalation option if domain complexity requires it later; do not implement auth, sessions, user ownership, or shared-ledger behavior until explicitly activated.
  Audit baseline: active OpenSpec changes and openspec/changes/IMPLEMENTATION_ORDER.md are the current roadmap source; archived specs preserve historical implementation context.
  Repo conventions: use Conventional Commits, branch from dev, keep changes staged by medium-sized validated steps, and avoid broad rewrites before contracts and tests exist.

rules:
  proposal:
    - Include explicit non-goals when the change intentionally documents future work without implementing it.
    - Reference BACKEND_RESTRUCTURE_AUDIT.md for audit-derived scope.
  design:
    - State technology decisions and alternatives, including Next.js, NestJS, Prisma ORM, PostgreSQL, runtime validation, tests, API docs, logging, and cache/rate-limit options.
    - Separate current implementation from future persistence/auth phases.
  tasks:
    - Use medium-sized stages that can be validated and committed independently.
    - Include validation commands for each implementation stage.
