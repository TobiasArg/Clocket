services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: clocket
      POSTGRES_PASSWORD: clocket
      POSTGRES_DB: clocket_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clocket -d clocket_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - clocket_postgres_data:/var/lib/postgresql/data

  migrate:
    image: clocket-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://clocket:clocket@postgres:5432/clocket_dev?schema=public
      DIRECT_URL: postgresql://clocket:clocket@postgres:5432/clocket_dev?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:generate && npm exec prisma migrate deploy"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  backend:
    image: clocket-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: postgresql://clocket:clocket@postgres:5432/clocket_dev?schema=public
      DIRECT_URL: postgresql://clocket:clocket@postgres:5432/clocket_dev?schema=public
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: npm run dev:docker
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  clocket_postgres_data:
  backend_node_modules:
  frontend_node_modules:
